name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: find . -name '*.py' ! -path './.venv/*' -exec python -m py_compile {} +

      - name: Block FastAPI in app.py
        run: |
          if grep -qE "^(from fastapi|import fastapi)" app.py; then
            echo "❌ FastAPI import detected in app.py — this project uses Taipy only. Remove all FastAPI code before merging."
            exit 1
          fi
          echo "✅ No FastAPI imports in app.py"
