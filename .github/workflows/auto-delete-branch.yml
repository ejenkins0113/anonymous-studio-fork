name: Auto Delete Branch After Merge

on:
  pull_request:
    branches: ["main"]
    types: [closed]

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete head branch
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;

            // Do not delete the main branch or protected branches
            if (branch === 'main') {
              console.log('Skipping deletion of main branch.');
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Branch "${branch}" deleted successfully.`);
            } catch (error) {
              console.log(`Could not delete branch "${branch}": ${error.message}`);
            }
